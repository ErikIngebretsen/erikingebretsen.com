<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erik Ingebretsen — Lyddesigner, musiker og komponist</title>
  <meta name="description" content="Erik Ingebretsen — lyddesigner, musiker og komponist.">
  <style>
    :root {
      --bg: #0f1115;
      --fg: #f5f5f4;
      --muted: #a1a1aa;
      --accent: #d4b483;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      line-height: 1.5;
    }
    main {
      text-align: center;
      max-width: 32rem;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.25rem);
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .role {
      margin-top: 0.75rem;
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: var(--muted);
      font-weight: 400;
    }
    .divider {
      width: 3rem;
      height: 2px;
      background: var(--accent);
      margin: 2rem auto;
      border: none;
    }
    a.contact {
      display: inline-block;
      font-size: clamp(1rem, 3vw, 1.15rem);
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }
    a.contact:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>Erik Ingebretsen</h1>
    <p class="role">Lyddesigner, musiker og komponist</p>
    <hr class="divider">
    <a class="contact" href="mailto:erik@erikingebretsen.com">erik@erikingebretsen.com</a>
  </main>
</body>
</html>
